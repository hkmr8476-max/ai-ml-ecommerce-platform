services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env.example
    depends_on:
      - postgres
      - redis

  ml-engine:
    build:
      context: ../ml-engine
      dockerfile: ../docker/ml-engine.Dockerfile
    command: ["python", "training_pipeline.py"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mlcommerce
      POSTGRES_USER: mlcommerce
      POSTGRES_PASSWORD: mlcommerce
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
